services:
  drakescraft-web:
    environment:
      TRANSLATE_UPSTREAM: http://libretranslate:5000

  libretranslate:
    image: libretranslate/libretranslate:v1.9.6
    container_name: drakescraft-libretranslate
    restart: unless-stopped
    environment:
      LT_LOAD_ONLY: es,en,pt,de
      LT_DISABLE_WEB_UI: "true"
    volumes:
      - ./libretranslate-data:/home/libretranslate/.local/share
    mem_limit: 2g
    cpus: 2.0
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/languages', timeout=5)\""]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 90s
