<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>DrakesCraft — Generar Checkout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0d0d14; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .card { background: #16161f; border: 1px solid #2a2a3a; border-radius: 12px; padding: 2rem; width: 100%; max-width: 480px; }
  h1 { font-size: 1.2rem; color: #a78bfa; margin-bottom: 1.5rem; }
  label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 0.25rem; margin-top: 1rem; }
  input, textarea { width: 100%; background: #0d0d14; border: 1px solid #2a2a3a; border-radius: 6px; color: #e0e0e0; padding: 0.6rem 0.8rem; font-size: 0.95rem; }
  input:focus, textarea:focus { outline: none; border-color: #a78bfa; }
  button { margin-top: 1.5rem; width: 100%; background: #7c3aed; color: #fff; border: none; border-radius: 8px; padding: 0.75rem; font-size: 1rem; font-weight: 600; cursor: pointer; }
  button:hover { background: #6d28d9; }
  button:disabled { background: #3a3a4a; cursor: not-allowed; }
  .result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; background: #0d0d14; border: 1px solid #2a2a3a; display: none; }
  .result.ok { border-color: #22c55e; }
  .result.err { border-color: #ef4444; }
  .result a { color: #a78bfa; word-break: break-all; }
  .copy-btn { margin-top: 0.75rem; background: #1e1e2e; border: 1px solid #2a2a3a; color: #a78bfa; border-radius: 6px; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.85rem; }
  .copy-btn:hover { background: #2a2a3a; }
  .token-row { display: flex; gap: 0.5rem; }
  .token-row input { flex: 1; }
  .token-actions { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
  .token-actions button { margin-top: 0; width: auto; padding: 0.55rem 0.8rem; font-size: 0.85rem; background: #1e1e2e; border: 1px solid #2a2a3a; color: #a78bfa; }
  .token-actions button:hover { background: #2a2a3a; }
  .hint { margin-top: 0.45rem; font-size: 0.8rem; color: #8b8ba7; }
</style>
</head>
<body>
<div class="card">
  <h1>⚡ Generar Link de Pago — Kit Personalizado</h1>

  <label>Admin Token</label>
  <div class="token-row">
    <input type="password" id="token" placeholder="X-Admin-Token">
    <button type="button" style="width:auto;margin:0;padding:0.6rem 0.8rem;font-size:0.85rem" onclick="toggleToken()">👁</button>
  </div>
  <div class="token-actions">
    <button type="button" onclick="saveToken()">Guardar token</button>
    <button type="button" onclick="clearToken()">Olvidar token</button>
  </div>
  <p class="hint" id="token-status">El token solo se guarda en este navegador.</p>

  <label>Nick de Minecraft (exacto)</label>
  <input type="text" id="nick" placeholder="Ej: marrano_Kun_0w0" maxlength="40">

  <label>Precio (USD)</label>
  <input type="number" id="price" placeholder="Ej: 15" min="1" max="500" step="0.01">
  <p class="hint">Temporalmente desactivado: Tebex Headless ignora el precio exacto y cobra el valor base del paquete.</p>

  <label>Discord / Contacto</label>
  <input type="text" id="contact" placeholder="Ej: @marrano" maxlength="120">

  <label>Notas del encargo</label>
  <textarea id="notes" rows="3" maxlength="500" placeholder="Ej: Kit netherita con Sharpness XX..."></textarea>

  <button id="btn" onclick="generate()">Generar Link de Pago</button>

  <div class="result" id="result"></div>
</div>

<script>
const TOKEN_STORAGE_KEY = 'drakescraft_admin_token';

function updateTokenStatus(message) {
  document.getElementById('token-status').textContent = message;
}

function loadSavedToken() {
  const saved = window.localStorage.getItem(TOKEN_STORAGE_KEY);
  if (saved) {
    document.getElementById('token').value = saved;
    updateTokenStatus('Token cargado desde este navegador.');
  }
}

function toggleToken() {
  const t = document.getElementById('token');
  t.type = t.type === 'password' ? 'text' : 'password';
}

function saveToken() {
  const token = document.getElementById('token').value.trim();
  if (!token) {
    updateTokenStatus('No hay token para guardar.');
    return;
  }

  window.localStorage.setItem(TOKEN_STORAGE_KEY, token);
  updateTokenStatus('Token guardado en este navegador.');
}

function clearToken() {
  window.localStorage.removeItem(TOKEN_STORAGE_KEY);
  document.getElementById('token').value = '';
  updateTokenStatus('Token eliminado de este navegador.');
}

async function generate() {
  const token = document.getElementById('token').value.trim();
  const nick = document.getElementById('nick').value.trim();
  const price = parseFloat(document.getElementById('price').value);
  const contact = document.getElementById('contact').value.trim();
  const notes = document.getElementById('notes').value.trim();
  const btn = document.getElementById('btn');
  const result = document.getElementById('result');

  if (!token || !nick || !price) {
    showResult('error', 'Token, nick y precio son obligatorios.');
    return;
  }

  window.localStorage.setItem(TOKEN_STORAGE_KEY, token);
  updateTokenStatus('Token guardado en este navegador.');

  btn.disabled = true;
  btn.textContent = 'Generando...';
  result.style.display = 'none';

  try {
    const res = await fetch('/api/quote-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
      body: JSON.stringify({ nick, price_usd: price, contact, notes })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Error desconocido');

    showResult('ok', `
      <strong>✅ Link generado para ${data.nick} — $${data.price_usd} USD</strong><br><br>
      <a href="${data.checkoutUrl}" target="_blank">${data.checkoutUrl}</a>
      <br>
      <button class="copy-btn" onclick="navigator.clipboard.writeText('${data.checkoutUrl}')">📋 Copiar link</button>
    `);
  } catch (e) {
    const message = String(e.message || 'Error desconocido');
    if (message.includes('Tebex Headless API no permite fijar un precio exacto')) {
      showResult('error', '❌ Tebex no soporta este flujo con precio exacto usando el paquete actual. Si generamos el link igual, checkout cobra $1.00. Hay que migrarlo a Checkout API custom products o usar otra estrategia.');
    } else {
      showResult('error', '❌ ' + message);
    }
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generar Link de Pago';
  }
}

function showResult(type, html) {
  const el = document.getElementById('result');
  el.className = 'result ' + (type === 'ok' ? 'ok' : 'err');
  el.innerHTML = html;
  el.style.display = 'block';
}

loadSavedToken();
</script>
</body>
</html>
